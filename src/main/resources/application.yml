spring:
  application:
    name: euni-backend-java
  main:
    lazy-initialization: true
    banner-mode: off
  jmx:
    enabled: false
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:euni_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.batch_size: 20
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations:
      - classpath:db/migration/versioned
      - classpath:db/migration/repeatable
#    ignore-migration-patterns: R__*

server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    com.euni.backend: DEBUG
    org.springframework.web: INFO
#    org.hibernate.SQL: DEBUG

app:
  seeder:
    database:
      enabled: false
    academic:
      enabled: false
    workflow-step:
      enabled: false
  logging:
    excluded-urls:
      - /api/v1/health
      - /swagger-ui
      - /v3/api-docs
      - /favicon.ico
    masked-fields:
      - password
      - token
      - accessToken
      - refreshToken
      - secret
      - base64
      - image
      - file
    max-field-length: 500
