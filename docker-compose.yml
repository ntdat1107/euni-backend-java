version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: euni-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: euni_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - euni-network

  redis:
    image: redis:7-alpine
    container_name: euni-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - euni-network

volumes:
  postgres_data:
  redis_data:

networks:
  euni-network:
    driver: bridge
